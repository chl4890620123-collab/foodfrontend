name: Frontend Unified Pipeline

on:
  push:
    branches: ["main", "dev"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # 핵심: --legacy-peer-deps를 사용하여 React 19 충돌을 강제로 해결합니다.
        run: npm install --legacy-peer-deps

      - name: Build project
        # 빌드 시 시각화 라이브러리(recharts)가 요구하는 환경을 강제 적용합니다.
        run: npm run build

      - name: Deploy to EC2 (Upload)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "dist/*"
          target: "/home/ec2-user/deploy_ready"
          strip_components: 1

      - name: Final Move and Nginx Refresh
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # 기존 에러가 포함된 파일들 완전 삭제
            sudo rm -rf /var/www/hanspoon/*
            
            # 새 빌드 파일 이동
            if [ -d "/home/ec2-user/deploy_ready" ]; then
                sudo mkdir -p /var/www/hanspoon
                sudo cp -r /home/ec2-user/deploy_ready/* /var/www/hanspoon/
                rm -rf /home/ec2-user/deploy_ready
            fi
            
            # 권한 설정 및 Nginx 재시작
            sudo chown -R ec2-user:ec2-user /var/www/hanspoon
            sudo chmod -R 755 /var/www/hanspoon
            
            sudo systemctl restart nginx
