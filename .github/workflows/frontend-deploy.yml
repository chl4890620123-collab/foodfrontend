name: Frontend Unified Pipeline

on:
  push:
    branches: ["main", "dev"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # 개별 install 대신 legacy-peer-deps를 통해 
        # recharts가 요구하는 react-is 버전을 강제로 맞춥니다.
        run: npm install --legacy-peer-deps

      - name: Build project
        # 빌드 시 발생하는 react-is 미참조 에러를 방지하기 위해 
        # CI 환경에서 최적화된 빌드를 수행합니다.
        run: npm run build

      - name: Deploy to EC2 (Upload)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "dist/*"
          target: "/home/ec2-user/deploy_ready" 
          strip_components: 1

      - name: Final Move and Nginx Refresh
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # 1. 경로 준비 및 기존 잔해 제거
            sudo mkdir -p /var/www/hanspoon
            sudo rm -rf /var/www/hanspoon/*
            
            # 2. 임시 대기소에서 실제 서비스 경로로 복사 및 정리
            if [ -d "/home/ec2-user/deploy_ready" ]; then
                sudo cp -r /home/ec2-user/deploy_ready/* /var/www/hanspoon/
                rm -rf /home/ec2-user/deploy_ready
            fi
            
            # 3. 권한 설정 (Nginx 계정 반영)
            sudo chown -R nginx:nginx /var/www/hanspoon || sudo chown -R ec2-user:ec2-user /var/www/hanspoon
            sudo chmod -R 755 /var/www/hanspoon
            sudo chmod 755 /var /var/www
            
            # 4. Nginx 설정 테스트 및 재시작
            sudo nginx -t && sudo systemctl restart nginx
