name: Frontend Unified Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # 핵심: react-is를 직접 명시하여 설치하고, 버전 충돌을 무시합니다.
        run: |
          npm install react-is --save-dev --legacy-peer-deps
          npm install --legacy-peer-deps

      - name: Build project
        run: npm run build

      - name: Deploy to EC2 (Upload)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "dist/*"
          target: "/home/ec2-user/deploy_ready"
          strip_components: 1

      - name: Final Move and Nginx Refresh
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # 1. 서버에 남은 이전 에러 찌꺼기를 완전히 삭제합니다.
            sudo rm -rf /var/www/hanspoon/*
            
            # 2. 새 빌드 파일을 이동합니다.
            if [ -d "/home/ec2-user/deploy_ready" ]; then
                sudo mkdir -p /var/www/hanspoon
                sudo cp -r /home/ec2-user/deploy_ready/* /var/www/hanspoon/
                rm -rf /home/ec2-user/deploy_ready
            fi
            
            # 3. 권한 설정 및 Nginx 재시작
            sudo chown -R ec2-user:ec2-user /var/www/hanspoon
            sudo chmod -R 755 /var/www/hanspoon
            sudo systemctl restart nginx
