name: Frontend Deployment

on:
  push:
    branches: [ "main" ] # 본인의 메인 브랜치명 확인

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Deploy to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          # 빌드된 dist(또는 build) 폴더의 내용을 서버의 임시 경로로 전송
          source: "dist/*" 
          target: "/home/ec2-user/frontend_temp"
          strip_components: 1

      - name: Move files and Set permissions
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            # 1. 대상 디렉토리 정리 및 이동
            sudo mkdir -p /var/www/hanspoon
            sudo rm -rf /var/www/hanspoon/*
            sudo cp -r /home/ec2-user/frontend_temp/* /var/www/hanspoon/
            
            # 2. [핵심] Nginx가 읽을 수 있도록 권한 강제 설정
            sudo chown -R nginx:nginx /var/www/hanspoon
            sudo chmod -R 755 /var/www/hanspoon
            
            # 3. Nginx 재시작 및 보안정책 확인
            sudo setenforce 0 || true
            sudo systemctl restart nginx
