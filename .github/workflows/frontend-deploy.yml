name: Frontend Deployment

on:
  push:
    branches: [ "main" ] # 본인의 메인 브랜치명 확인

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. 의존성 충돌 해결 (forwardRef 에러 해결을 위해 legacy-peer-deps 사용)
      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps

      # 2. 프로젝트 빌드
      - name: Build project
        run: npm run build

      # 3. 빌드된 결과물을 EC2 임시 폴더로 전송
      - name: Deploy to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          source: "dist/*"  # Vite 사용 시 dist, CRA 사용 시 build 폴더인지 확인 필수
          target: "/home/ec2-user/frontend_temp"
          strip_components: 1

      # 4. 서버 내 파일 이동 및 권한/보안 설정 강제 적용 (배포 마다 실행)
      - name: Move files and Set permissions
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            # 1. 대상 웹 루트 디렉토리 비우기
            sudo mkdir -p /var/www/hanspoon
            sudo rm -rf /var/www/hanspoon/*
            
            # 2. 임시 폴더에서 실제 웹 서버 경로로 파일 이동
            sudo cp -r /home/ec2-user/frontend_temp/* /var/www/hanspoon/
            
            # 3. [핵심] Nginx가 파일을 읽을 수 있도록 소유권 및 권한 강제 부여
            sudo chown -R nginx:nginx /var/www/hanspoon
            sudo chmod -R 755 /var/www/hanspoon
            
            # 4. 상위 폴더(var, www)에 대한 접근 권한 보장
            sudo chmod 755 /var /var/www
            
            # 5. 보안 정책(SELinux) 해제 및 Nginx 재시작
            sudo setenforce 0 || true
            sudo systemctl restart nginx
            
            # 6. 전송용 임시 폴더 삭제
            rm -rf /home/ec2-user/frontend_temp
