name: Frontend Deployment

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # [수정] 라이브러리 충돌(forwardRef 에러) 방지를 위한 설치 명령
      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Build project
        run: npm run build

      - name: Deploy to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          source: "dist/*"
          target: "/home/ec2-user/frontend_temp"
          strip_components: 1

      - name: Move files and Set permissions
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo mkdir -p /var/www/hanspoon
            sudo rm -rf /var/www/hanspoon/*
            sudo cp -r /home/ec2-user/frontend_temp/* /var/www/hanspoon/
            
            sudo chown -R nginx:nginx /var/www/hanspoon
            sudo chmod -R 755 /var/www/hanspoon
            sudo chmod 755 /var /var/www
            
            sudo setenforce 0 || true
            sudo systemctl restart nginx
