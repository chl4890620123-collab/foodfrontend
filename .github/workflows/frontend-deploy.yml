name: Frontend Unified Pipeline

on:
  push:
    branches: ["main", "dev"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Clean and Install Dependencies
        # React 19 호환성을 위해 legacy-peer-deps를 쓰고, react-is를 빌드 단계에 포함합니다.
        run: |
          npm install react-is --save-dev --legacy-peer-deps
          npm install --legacy-peer-deps

      - name: Build project
        # 빌드 시점에 환경 차이로 인한 에러를 방지합니다.
        run: npm run build

      - name: Deploy to EC2 (Upload)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "dist/*"
          target: "/home/ec2-user/deploy_ready"
          strip_components: 1

      - name: Final Move and Nginx Refresh
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # 1. 기존의 오염된 파일들 싹 제거 (매우 중요)
            sudo rm -rf /var/www/hanspoon/*
            
            # 2. 새 빌드 파일 이동
            if [ -d "/home/ec2-user/deploy_ready" ]; then
                sudo mkdir -p /var/www/hanspoon
                sudo cp -r /home/ec2-user/deploy_ready/* /var/www/hanspoon/
                rm -rf /home/ec2-user/deploy_ready
            fi
            
            # 3. 권한 재설정 (Nginx가 읽을 수 있도록)
            sudo chown -R ec2-user:ec2-user /var/www/hanspoon
            sudo chmod -R 755 /var/www/hanspoon
            
            # 4. Nginx 재시작
            sudo systemctl restart nginx
