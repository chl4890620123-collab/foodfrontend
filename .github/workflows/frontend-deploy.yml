name: Frontend Unified Pipeline

on:
  push:
    branches: ["main", "dev"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # [해결 1] 빌드 에러 "react-is" 결함 강제 수정 및 의존성 설치
      - name: Install dependencies
        run: |
          npm install react-is --save-dev
          npm install --legacy-peer-deps

      # [해결 2] 프로젝트 빌드
      - name: Build project
        run: npm run build

      # [해결 3] EC2 전송 (Key 설정 확인 및 포트 명시)
      - name: Deploy to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          port: 22
          source: "dist/*"
          target: "/home/ec2-user/frontend_temp"
          strip_components: 1

      # [해결 4] 서버 권한 설정 및 Nginx 재시작
      - name: Move files and Set permissions
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          port: 22
          script: |
            sudo mkdir -p /var/www/hanspoon
            sudo rm -rf /var/www/hanspoon/*
            sudo cp -r /home/ec2-user/frontend_temp/* /var/www/hanspoon/
            
            # Nginx 권한 강제 부여
            sudo chown -R nginx:nginx /var/www/hanspoon
            sudo chmod -R 755 /var/www/hanspoon
            sudo chmod 755 /var /var/www
            
            # 보안 정책 및 서비스 재시작
            sudo setenforce 0 || true
            sudo systemctl restart nginx
            rm -rf /home/ec2-user/frontend_temp
