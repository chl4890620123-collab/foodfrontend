name: Frontend Unified Pipeline

on:
  push:
    branches: ["main", "dev"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # 강제로 모든 의존성 충돌을 무시하고 설치합니다.
        run: npm install --legacy-peer-deps

      - name: Build project
        # 위에서 설정한 package.json 기반으로 정상적인 JS 파일을 생성합니다.
        run: npm run build

      - name: Deploy to EC2 (Upload)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "dist/*"
          target: "/home/ec2-user/deploy_ready"
          strip_components: 1

      - name: Final Move and Nginx Refresh
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # 1. 서버의 기존 파일들(에러 원인)을 싹 비웁니다.
            sudo rm -rf /var/www/hanspoon/*
            
            # 2. 새 빌드 파일을 옮깁니다.
            if [ -d "/home/ec2-user/deploy_ready" ]; then
                sudo mkdir -p /var/www/hanspoon
                sudo cp -r /home/ec2-user/deploy_ready/* /var/www/hanspoon/
                rm -rf /home/ec2-user/deploy_ready
            fi
            
            # 3. 권한 설정
            sudo chown -R ec2-user:ec2-user /var/www/hanspoon
            sudo chmod -R 755 /var/www/hanspoon
            
            # 4. Nginx 재시작
            sudo systemctl restart nginx
