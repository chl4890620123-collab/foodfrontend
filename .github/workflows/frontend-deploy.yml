name: Backend Deployment

on:
  push:
    branches: [ "main" ] # 본인의 메인 브랜치명

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17 # 프로젝트 자바 버전 확인
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Deploy to EC2 via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ec2-user/backend_temp"
          strip_components: 2

      - name: Execute Application
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # 1. 포트 8080을 사용하는 기존 프로세스 종료
            CURRENT_PID=$(sudo lsof -ti:8080)
            if [ ! -z "$CURRENT_PID" ]; then
              sudo kill -15 $CURRENT_PID
              sleep 5
            fi

            # 2. 파일 정리 및 실행
            mkdir -p /home/ec2-user/backend
            mv /home/ec2-user/backend_temp/*.jar /home/ec2-user/backend/current.jar
            
            # 3. 백그라운드 실행 (로그는 nohup.out에 저장)
            nohup java -jar /home/ec2-user/backend/current.jar > /home/ec2-user/backend/nohup.out 2>&1 &
